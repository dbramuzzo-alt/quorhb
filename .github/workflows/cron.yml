name: Monitor Musica Globale
on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Aggiornato alla v5 (compatibile con Node 24)
      - name: Checkout
        uses: actions/checkout@v5

      # Aggiornato alla v6 (compatibile con Node 24)
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Dependencies
        run: pip install requests pandas lxml beautifulsoup4

      - name: Run Monitors
        id: run_scripts
        run: |
          python monitor.py > itunes_res.txt || echo "ERROR" > itunes_res.txt
          python spotify_monitor.py > spotify_res.txt || echo "ERROR" > spotify_res.txt
          
          RES_I=$(cat itunes_res.txt)
          RES_S=$(cat spotify_res.txt)
          
          echo "iTunes: $RES_I"
          echo "Spotify: $RES_S"
          
          if [[ "$RES_I" == *"FOUND"* || "$RES_S" == *"FOUND"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Save Changes
        if: steps.run_scripts.outputs.found == 'true'
        run: |
          git config --global user.name 'Bot-Musica'
          git config --global user.email 'actions@github.com'
          git add novita_classifiche.txt
          git commit -m "Aggiornamento automatico: Nuove entrate rilevate"
          git push
          
