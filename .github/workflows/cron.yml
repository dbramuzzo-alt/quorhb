name: Monitor Kworb Automatico
on:
  schedule:
    - cron: '*/30 * * * *' # Gira ogni 30 minuti
  workflow_dispatch: # Questo ti permette di avviarlo a mano per test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Copia il contenuto del repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installa le librerie necessarie
        run: pip install requests pandas lxml beautifulsoup4

      - name: Esegui lo script di controllo
        id: run_script
        run: |
          OUTPUT=$(python monitor.py)
          echo "result=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Salva i cambiamenti (se ci sono novità)
        if: contains(steps.run_script.outputs.result, 'FOUND')
        run: |
          git config --global user.name 'Bot-Monitor'
          git config --global user.email 'actions@github.com'
          git add novita_classifiche.txt
          git commit -m "Aggiornamento: Nuove canzoni trovate"
          git push
          
