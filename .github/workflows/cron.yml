      - name: Run Monitors
        id: run_scripts
        run: |
          echo "Avvio monitor iTunes..."
          OUT_ITUNES=$(python monitor.py)
          echo "Risultato iTunes: $OUT_ITUNES"
          
          echo "Avvio monitor Spotify..."
          OUT_SPOTIFY=$(python spotify_monitor.py)
          echo "Risultato Spotify: $OUT_SPOTIFY"

          echo "Avvio monitor TikTok..."
          OUT_TIKTOK=$(python tiktok_monitor.py)
          echo "Risultato TikTok: $OUT_TIKTOK"
          
          if [[ "$OUT_ITUNES" == *"FOUND"* || "$OUT_SPOTIFY" == *"FOUND"* || "$OUT_TIKTOK" == *"FOUND"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "STATO: Novità rilevate!"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "STATO: Nessun cambiamento."
          fi
