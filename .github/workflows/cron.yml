name: Monitor Musica Globale
on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies
        run: pip install requests pandas lxml beautifulsoup4

      - name: Run Monitors
        id: run_scripts
        run: |
          # Esegue iTunes e salva il risultato
          OUT1=$(python monitor.py)
          # Esegue Spotify e salva il risultato
          OUT2=$(python spotify_monitor.py)
          
          # Se almeno uno dei due ha trovato novità (FOUND)
          if [[ "$OUT1" == *"FOUND"* || "$OUT2" == *"FOUND"* ]]; then
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Save Changes
        if: steps.run_scripts.outputs.found == 'true'
        run: |
          git config --global user.name 'Bot-Musica'
          git config --global user.email 'actions@github.com'
          git add novita_classifiche.txt
          git commit -m "Novità rilevata nelle classifiche"
          git push
          
